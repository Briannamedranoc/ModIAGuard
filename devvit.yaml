# NOTE: Devvit CLI loads devvit.json (see schema URL inside that file).
# This YAML is a human-readable mirror for teammates / reviewers.
name: modaiguard

blocks:
  entry: src/main.tsx
  menu:
    enable: true
  forms:
    enable: true
  settings:
    enable: false
  triggers: []

server:
  dir: dist/server
  entry: index.cjs

menu:
  items:
    - label: Mop comments
      description: >-
        Remove this comment and all child comments. This might take a few seconds to run.
      location: comment
      forUserType: moderator
      endpoint: /internal/menu/mop-comment
    - label: Mop post comments
      description: >-
        Remove all comments of this post. This might take a few seconds to run.
      location: post
      forUserType: moderator
      endpoint: /internal/menu/mop-post

forms:
  mopComment: /internal/form/mop-comment-submit
  mopPost: /internal/form/mop-post-submit

triggers:
  onAppInstall: /internal/triggers/on-app-install
  onPostSubmit: /internal/triggers/on-post-submit

scripts:
  build: vite build
  dev: vite build --watch

permissions:
  reddit: true

dev:
  subreddit: modaiguard_dev
